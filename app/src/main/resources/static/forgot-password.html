<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Forgot Password - FinanceBuddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
  <div class="bg-white p-8 rounded-[24px] shadow-sm border border-gray-100 w-full max-w-md my-8">
    <div class="text-center mb-8">
      <h1 class="text-[32px] font-bold text-[#366758] tracking-tight">FinanceBuddy</h1>
      <p class="text-gray-500 text-sm mt-1">Lupa Password</p>
    </div>

    <!-- STEP 1: Input Identifier -->
    <div id="stepRequest">
      <form id="requestForm" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Username / Email</label>
          <input type="text" id="identifier" placeholder="Masukkan username atau email"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758]" required />
        </div>

        <p id="requestError" class="text-red-500 text-sm hidden"></p>

        <button type="submit" id="btnRequest"
          class="w-full py-3 bg-[#9dd1bf] hover:bg-[#366758] hover:text-white text-[#1c4f41] rounded-xl font-semibold transition-all duration-200 flex items-center justify-center gap-2 shadow-sm">
          Kirim OTP <span>➔</span>
        </button>
      </form>
    </div>

    <!-- STEP 2: Input OTP & New Password -->
    <div id="stepReset" class="hidden space-y-5">
      <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
        <div class="text-2xl mb-1">📧</div>
        <p class="text-sm text-green-700 font-medium">OTP telah dikirim ke email Anda</p>
      </div>

      <form id="resetForm" class="space-y-5">
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Kode OTP</label>
            <input type="text" id="otp" placeholder="123456" maxlength="6"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758] tracking-widest font-bold text-center" required />
        </div>
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Password Baru</label>
            <input type="password" id="newPassword" placeholder="Minimal 8 karakter"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758]" required />
        </div>
        
        <p id="resetError" class="text-red-500 text-sm text-center hidden"></p>

        <button type="submit" id="btnReset"
          class="w-full py-3 bg-[#9dd1bf] hover:bg-[#366758] hover:text-white text-[#1c4f41] rounded-xl font-semibold transition-all duration-200 shadow-sm">
          Reset Password ✓
        </button>
      </form>

      <button id="btnBack" class="w-full py-2 text-sm text-gray-500 hover:text-gray-700">
        ← Kembali
      </button>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center text-xs text-gray-500">
      <a href="index.html" class="text-[#366758] font-semibold hover:underline">Kembali ke halaman Login</a>
    </div>
  </div>

  <script type="module">
    import { sendForgotPasswordOtp, resetPassword } from "./js/api.js";

    const stepRequest = document.getElementById("stepRequest");
    const stepReset = document.getElementById("stepReset");
    let savedIdentifier = "";

    // ── STEP 1: Minta OTP ─────────────────────────────────────────
    document.getElementById("requestForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnRequest");
      const errEl = document.getElementById("requestError");
      errEl.classList.add("hidden");

      const identifier = document.getElementById("identifier").value;

      try {
        btn.disabled = true;
        btn.innerText = "Mengirim...";
        
        await sendForgotPasswordOtp(identifier);

        savedIdentifier = identifier;
        stepRequest.classList.add("hidden");
        stepReset.classList.remove("hidden");
        document.getElementById("otp").focus();
      } catch (err) {
        errEl.textContent = "Gagal mengirim OTP: " + err.message;
        errEl.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Kirim OTP <span>➔</span>';
      }
    });

    // ── STEP 2: Reset Password ─────────────────────────────────────────────
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const otp = document.getElementById("otp").value;
      const newPassword = document.getElementById("newPassword").value;
      const errEl = document.getElementById("resetError");
      const btn = document.getElementById("btnReset");
      errEl.classList.add("hidden");

      if (otp.length < 6) {
        errEl.textContent = "Masukkan 6 digit kode OTP";
        errEl.classList.remove("hidden");
        return;
      }

      if (newPassword.length < 8) {
        errEl.textContent = "Password minimal 8 karakter";
        errEl.classList.remove("hidden");
        return;
      }

      try {
        btn.disabled = true;
        btn.innerText = "Memproses...";
        await resetPassword(savedIdentifier, otp, newPassword);
        
        alert("Password berhasil direset! Silakan login.");
        window.location.href = "index.html";
      } catch (err) {
        errEl.textContent = err.message || "Gagal mereset password.";
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.innerText = "Reset Password ✓";
      }
    });

    // ── Kembali ────────────────────────────────────────────────────────────
    document.getElementById("btnBack").addEventListener("click", () => {
      stepReset.classList.add("hidden");
      stepRequest.classList.remove("hidden");
    });
  </script>
</body>
</html>
