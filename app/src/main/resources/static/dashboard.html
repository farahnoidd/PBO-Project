<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin-top: 0;
            color: #555;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dashboard Keuangan</h1>
        
        <div class="grid-container">
            <div class="card">
                <h3>Visualisasi Alokasi Pengeluaran (Donut Chart)</h3>
                <div class="chart-container">
                    <canvas id="donutChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Laporan Tren Keuangan (Bar Chart)</h3>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchDashboardData() {
            try {
                const token = localStorage.getItem('token') || localStorage.getItem('jwt') || localStorage.getItem('accessToken'); 

                if (!token) {
                    console.warn("Token tidak ditemukan, silahkan login terlebih dahulu.");
                    return;
                }

                const response = await fetch('/api/report/dashboard', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Gagal mengambil data riil dari backend. Status: ' + response.status);
                }

                const data = await response.json(); 
                
                barChart.data.datasets[0].data = [data.totalIncome];
                barChart.data.datasets[1].data = [data.totalExpense];
                
                barChart.update();

                console.log("Data riil database sukses masuk ke grafik:", data);
            } catch (error) {
                console.error("Error saat fetch data riil:", error);
            }
        }

        window.onload = fetchDashboardData;
    </script>
</body>
</html>
