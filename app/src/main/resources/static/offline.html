<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Offline - FinanceBuddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #faf9f8;
      color: #1a1c1c;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .icon-wrap {
      width: 72px; height: 72px;
      background: #b5ead7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.4rem; font-weight: 700; color: #366758; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #366758;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1c4f41; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">📡</div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Anda sedang offline. Periksa koneksi internet dan coba lagi.</p>
    <button onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
