<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login - FinanceBuddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">
  <div class="bg-white p-8 rounded-[24px] shadow-sm border border-gray-100 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-[32px] font-bold text-[#366758] tracking-tight">FinanceBuddy</h1>
      <p class="text-gray-500 text-sm mt-1">Student Edition</p>
    </div>

    <!-- ══ STEP 1: Username & Password ══════════════════════════════════════ -->
    <div id="stepLogin">
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Username / ID</label>
          <input type="text" id="username" placeholder="Masukkan student ID"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758]"
            required />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5">Password</label>
          <input type="password" id="password" placeholder="••••••••"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758]"
            required />
        </div>

        <p id="loginError" class="text-red-500 text-sm hidden"></p>

        <button type="submit" id="btnLogin"
          class="w-full py-3 bg-[#9dd1bf] hover:bg-[#366758] hover:text-white text-[#1c4f41] rounded-xl font-semibold transition-all duration-200 flex items-center justify-center gap-2 shadow-sm">
          Masuk <span>➔</span>
        </button>
      </form>
    </div>

    <div class="mt-4 text-center">
      <a href="forgot-password.html" class="text-sm text-[#366758] font-medium hover:underline">Lupa Password?</a>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center text-xs text-gray-500">
      Belum punya akun?
      <a href="register.html" class="text-[#366758] font-semibold hover:underline">Daftar sekarang</a>
    </div>
  </div>

  <script type="module">
    import { login } from "./js/api.js";

    // Bersihkan token lama saat halaman login dibuka
    // Ini mencegah error 401 akibat token kadaluarsa / tidak valid
    localStorage.removeItem("token");

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnLogin");
      const errEl = document.getElementById("loginError");
      errEl.classList.add("hidden");

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        btn.disabled = true;
        btn.innerText = "Loading...";
        
        const res = await login(username, password);
        
        alert("Login Berhasil! Selamat datang 👋");
        window.location.href = res.role === "ROLE_ADMIN" || res.role === "ADMIN" ? "admin.html" : "dashboard.html";
      } catch (err) {
        errEl.textContent = "Login Gagal: " + err.message;
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.innerText = "Masuk";
      }
    });
  </script>
</body>
</html>
