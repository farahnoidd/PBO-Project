<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - FinanceBuddy</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  </head>
  <body
    class="bg-slate-50 flex items-center justify-center min-h-screen font-sans"
  >
    <div
      class="bg-white p-8 rounded-[24px] shadow-sm border border-gray-100 w-full max-w-md"
    >
      <div class="text-center mb-8">
        <h1 class="text-[32px] font-bold text-[#366758] tracking-tight">
          FinanceBuddy
        </h1>
        <p class="text-gray-500 text-sm mt-1">Student Edition</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5"
            >Username / ID</label
          >
          <input
            type="text"
            id="username"
            placeholder="Enter your student ID"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758]"
            required
          />
        </div>
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1.5"
            >Password</label
          >
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#366758] focus:ring-1 focus:ring-[#366758]"
            required
          />
        </div>

        <div class="text-right text-xs">
          <a href="#" class="text-[#366758] font-medium hover:underline"
            >Forgot password?</a
          >
        </div>

        <button
          type="submit"
          id="btnLogin"
          class="w-full py-3 bg-[#9dd1bf] hover:bg-[#366758] hover:text-white text-[#1c4f41] rounded-xl font-semibold transition-all duration-200 flex items-center justify-center gap-2 shadow-sm"
        >
          Login <span>➔</span>
        </button>
      </form>

      <div
        class="mt-8 pt-6 border-t border-gray-100 text-center text-xs text-gray-500"
      >
        Need an account?
        <a href="#" class="text-[#366758] font-semibold hover:underline"
          >Contact Admin</a
        >
      </div>
    </div>

    <script type="module">
      import { login } from "./js/api.js";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("btnLogin");
          try {
            btn.disabled = true;
            btn.innerText = "Processing...";

            const res = await login(
              document.getElementById("username").value,
              document.getElementById("password").value,
            );

            alert("Login Berhasil!");
            window.location.href =
              res.role === "ADMIN" ? "admin.html" : "dashboard.html";
          } catch (err) {
            alert("Login Gagal: " + err.message);
            btn.disabled = false;
            btn.innerText = "Login ➔";
          }
        });
    </script>
  </body>
</html>
