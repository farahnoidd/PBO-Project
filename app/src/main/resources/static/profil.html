<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil - FinanceBuddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">FinanceBuddy</div>
        <ul>
            <li><a href="admin.html">Dashboard</a></li>
            <li><a href="#">Pemasukan</a></li>
            <li><a href="#">Pengeluaran</a></li>
            <li><a href="#">Laporan</a></li>
            <li><a class="active" href="profil.html">Profil</a></li>
            <li><a href="index.html" style="color: #dc3545;">Logout</a></li>
        </ul>
    </div>

    <div class="content">

        <div class="topbar">
            <h1 class="page-title">Profil</h1>
            <div class="profile-mini">?</div>
        </div>

        <div class="card">
            <form action="#">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" class="form-control" placeholder="Masukkan nama lengkap Anda..." required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Masukkan email Anda..." required>
                </div>

                <div class="form-group">
                    <label>No HP</label>
                    <input type="text" class="form-control" placeholder="Masukkan nomor HP..." required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Simpan Perubahan
                </button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
